services:
  postgres:
    image: postgres:18-alpine
    container_name: hospital-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital123
      POSTGRES_DB: hospital_registration
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospital_registration"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hospital-net

  redis:
    image: redis:8.6.3-alpine
    container_name: hospital-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hospital-net

networks:
  hospital-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
