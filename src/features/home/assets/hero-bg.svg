<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="hero_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#hero_grad)"/>
  <!-- Abstract medical cross pattern -->
  <g opacity="0.08">
    <rect x="80" y="60" width="40" height="10" rx="5" fill="white"/>
    <rect x="95" y="45" width="10" height="40" rx="5" fill="white"/>
    
    <rect x="230" y="180" width="60" height="14" rx="7" fill="white"/>
    <rect x="250" y="160" width="14" height="60" rx="7" fill="white"/>
    
    <rect x="420" y="90" width="30" height="8" rx="4" fill="white"/>
    <rect x="430" y="80" width="8" height="30" rx="4" fill="white"/>
    
    <rect x="150" y="300" width="50" height="12" rx="6" fill="white"/>
    <rect x="165" y="285" width="12" height="50" rx="6" fill="white"/>
    
    <rect x="500" y="250" width="40" height="10" rx="5" fill="white"/>
    <rect x="515" y="235" width="10" height="40" rx="5" fill="white"/>
    
    <rect x="350" y="40" width="20" height="6" rx="3" fill="white"/>
    <rect x="357" y="33" width="6" height="20" rx="3" fill="white"/>
  </g>
  <!-- Floating circles -->
  <circle cx="120" cy="100" r="30" fill="white" opacity="0.04"/>
  <circle cx="480" cy="80" r="50" fill="white" opacity="0.04"/>
  <circle cx="300" cy="350" r="40" fill="white" opacity="0.04"/>
  <circle cx="550" cy="320" r="25" fill="white" opacity="0.03"/>
  <circle cx="50" cy="330" r="35" fill="white" opacity="0.03"/>
  <!-- Heartbeat line -->
  <g opacity="0.12">
    <path d="M100 200 L140 200 L155 170 L170 230 L185 190 L200 200 L500 200" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Plus symbols -->
  <g opacity="0.06" stroke="white" stroke-width="2" stroke-linecap="round">
    <line x1="280" y1="130" x2="280" y2="150"/>
    <line x1="270" y1="140" x2="290" y2="140"/>
    
    <line x1="450" y1="170" x2="450" y2="186"/>
    <line x1="442" y1="178" x2="458" y2="178"/>
  </g>
</svg>
