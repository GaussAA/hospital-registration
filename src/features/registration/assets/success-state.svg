<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="#ECFDF5" opacity="0.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#A7F3D0" stroke-width="3"/>
  <!-- Middle circle -->
  <circle cx="100" cy="100" r="65" fill="url(#sg)"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="#6EE7B7" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="45" fill="#D1FAE5"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#10B981" stroke-width="2.5"/>
  <!-- Checkmark -->
  <path d="M76 100 L93 117 L124 83" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <g fill="#34D399" opacity="0.7">
    <circle cx="145" cy="55" r="3"/>
    <circle cx="165" cy="100" r="2"/>
    <circle cx="50" cy="50" r="2.5"/>
    <circle cx="35" cy="120" r="2"/>
    <circle cx="155" cy="150" r="2.5"/>
    <circle cx="60" cy="155" r="2"/>
  </g>
  <!-- Plus mini crosses -->
  <g stroke="#34D399" stroke-width="1.5" stroke-linecap="round">
    <line x1="145" y1="52" x2="145" y2="58"/>
    <line x1="142" y1="55" x2="148" y2="55"/>
    <line x1="48" y1="47" x2="48" y2="53"/>
    <line x1="45" y1="50" x2="51" y2="50"/>
  </g>
</svg>
