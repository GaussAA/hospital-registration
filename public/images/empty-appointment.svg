<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="cal_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>
  <!-- Calendar base -->
  <rect x="40" y="45" width="120" height="130" rx="12" fill="url(#cal_bg)" stroke="#BAE6FD" stroke-width="2"/>
  <!-- Calendar top bar -->
  <rect x="40" y="45" width="120" height="32" rx="12" fill="#38BDF8"/>
  <rect x="40" y="65" width="120" height="12" fill="#38BDF8"/>
  <!-- Calendar dots (page binding) -->
  <circle cx="62" cy="61" r="2" fill="white"/>
  <circle cx="100" cy="61" r="2" fill="white"/>
  <circle cx="138" cy="61" r="2" fill="white"/>
  <!-- Calendar grid lines -->
  <line x1="55" y1="88" x2="145" y2="88" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="55" y1="108" x2="145" y2="108" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="55" y1="128" x2="145" y2="128" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="55" y1="148" x2="145" y2="148" stroke="#E0F2FE" stroke-width="1"/>
  <!-- Vertical grid lines -->
  <line x1="78" y1="88" x2="78" y2="155" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="101" y1="88" x2="101" y2="155" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="124" y1="88" x2="124" y2="155" stroke="#E0F2FE" stroke-width="1"/>
  <!-- Checkmark (big, green) -->
  <circle cx="100" cy="120" r="22" fill="#D1FAE5" opacity="0.8"/>
  <path d="M88 120 L96 128 L113 111" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Empty state text area -->
  <rect x="32" y="160" width="136" height="40" rx="20" fill="#F1F5F9"/>
  <!-- Decorative circles -->
  <circle cx="170" cy="40" r="8" fill="#E0F2FE" opacity="0.6"/>
  <circle cx="30" cy="35" r="5" fill="#FEE2E2" opacity="0.5"/>
  <circle cx="175" cy="170" r="6" fill="#FEF3C7" opacity="0.6"/>
</svg>
