<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="240" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="195" width="400" height="45" fill="#86EFAC" rx="0"/>
  <!-- Main building -->
  <rect x="100" y="60" width="200" height="140" rx="4" fill="url(#bldg)"/>
  <!-- Building top -->
  <rect x="100" y="60" width="200" height="8" rx="2" fill="#3B82F6"/>
  <!-- Medical cross on building -->
  <rect x="185" y="70" width="30" height="8" rx="2" fill="url(#cross)"/>
  <rect x="196" y="59" width="8" height="30" rx="2" fill="url(#cross)"/>
  <!-- Windows row 1 -->
  <rect x="115" y="90" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="147" y="90" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="179" y="90" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="211" y="90" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="243" y="90" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <!-- Windows row 2 -->
  <rect x="115" y="118" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="147" y="118" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="179" y="118" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="211" y="118" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="243" y="118" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <!-- Windows row 3 -->
  <rect x="115" y="146" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="147" y="146" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="179" y="146" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="211" y="146" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <rect x="243" y="146" width="22" height="18" rx="2" fill="#BFDBFE"/>
  <!-- Door -->
  <rect x="175" y="170" width="50" height="30" rx="4" fill="#3B82F6"/>
  <!-- Door arch -->
  <path d="M175 170 Q200 150 225 170" fill="#3B82F6"/>
  <!-- Clouds -->
  <ellipse cx="70" cy="35" rx="35" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="100" cy="30" rx="25" ry="10" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="40" rx="30" ry="10" fill="white" opacity="0.7"/>
  <ellipse cx="345" cy="35" rx="20" ry="8" fill="white" opacity="0.7"/>
  <!-- Sun -->
  <circle cx="340" cy="20" r="18" fill="#FDE68A" opacity="0.6"/>
  <!-- Trees -->
  <rect x="75" y="170" width="6" height="25" fill="#92400E"/>
  <circle cx="78" cy="160" r="18" fill="#4ADE80" opacity="0.8"/>
  <rect x="319" y="170" width="6" height="25" fill="#92400E"/>
  <circle cx="322" cy="160" r="18" fill="#4ADE80" opacity="0.8"/>
  <!-- Small bushes -->
  <ellipse cx="130" cy="195" rx="15" ry="8" fill="#4ADE80" opacity="0.6"/>
  <ellipse cx="270" cy="195" rx="15" ry="8" fill="#4ADE80" opacity="0.6"/>
</svg>
