<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="80" cy="80" r="78"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="80" cy="80" r="78" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="78" fill="none" stroke="#93C5FD" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="80" cy="68" rx="28" ry="32" fill="#FED7AA"/>
  <!-- Hair -->
  <path d="M52 58 Q60 38 80 35 Q100 38 108 58 Q105 50 100 46 Q95 42 80 40 Q65 42 60 46 Q55 50 52 58Z" fill="#475569"/>
  <!-- Eyes -->
  <ellipse cx="70" cy="66" rx="3.5" ry="2" fill="#334155"/>
  <ellipse cx="90" cy="66" rx="3.5" ry="2" fill="#334155"/>
  <!-- Smile -->
  <path d="M73 78 Q80 84 87 78" fill="none" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stethoscope -->
  <path d="M92 80 Q98 75 102 68 Q105 62 100 58" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="102" cy="57" r="6" fill="none" stroke="#64748B" stroke-width="2"/>
  <!-- Medical cross on stethoscope -->
  <path d="M102 54 L102 60 M99 57 L105 57" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- White coat collar -->
  <path d="M62 96 Q70 90 80 94 Q90 90 98 96 L95 115 L65 115Z" fill="url(#coat)"/>
  <!-- Stethoscope tubing down -->
  <path d="M92 80 Q90 88 88 94" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Badge on coat -->
  <rect x="73" y="100" width="14" height="5" rx="2" fill="#3B82F6"/>
</svg>
